<header class="site-header">
  <div class="container">
    <a class="site-logo" href="{{ '/' | relative_url }}">
      <span class="logo-bracket">{</span> AM <span class="logo-bracket">}</span>
    </a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
      <a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about' %}class="active"{% endif %}>About</a>
      <a href="{{ '/projects/' | relative_url }}" {% if page.url contains '/projects' %}class="active"{% endif %}>Projects</a>
      <a href="https://www.linkedin.com/in/{{ site.author.linkedin }}/" class="btn btn--nav" target="_blank" rel="noopener">Hire Me</a>
    </nav>
    <button class="nav-toggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<script>
  const toggle = document.querySelector('.nav-toggle');
  const nav = document.querySelector('.site-nav');
  if (toggle) {
    toggle.addEventListener('click', () => {
      nav.classList.toggle('open');
      toggle.classList.toggle('open');
    });
  }
</script>
